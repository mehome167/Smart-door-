<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Darwaza Pro • Smart Doorbell</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

    <style>
        :root { --accent: #FF9F0A; --bg: #000000; --card: #1C1C1E; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; overflow-x: hidden; margin: 0; }
        .glass { background: rgba(28, 28, 30, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .screen { min-height: 100vh; display: none; padding-bottom: 100px; box-sizing: border-box; }
        .active-screen { display: flex; flex-direction: column; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-item.active { color: var(--accent); }
        input, select { background: #2C2C2E; border: 1px solid #3A3A3C; border-radius: 12px; padding: 14px; color: white; width: 100%; outline: none; }
        .visitor-img-frame { width: 140px; height: 140px; border-radius: 50%; border: 3px solid var(--accent); object-fit: cover; background: #1c1c1e; margin: 0 auto 20px; }
        #v-camera { width: 100%; border-radius: 20px; background: #000; display: none; transform: scaleX(-1); margin-bottom: 15px; }
        .reason-chip { padding: 8px 16px; border-radius: 20px; border: 1px solid #3A3A3C; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .reason-chip.selected { background: var(--accent); color: black; border-color: var(--accent); }
    </style>
</head>
<body>

    <div id="call-overlay" class="hidden fixed inset-0 bg-black z-[1000] flex flex-col items-center justify-center p-6 text-center">
        <div class="mb-4 text-orange-400 animate-pulse font-bold tracking-widest">LIVE CALL</div>
        <h2 id="incoming-door-name" class="text-3xl font-bold mb-4">Main Door</h2>
        <img id="visitor-selfie-display" src="" class="visitor-img-frame shadow-2xl shadow-orange-500/40">
        <div class="glass rounded-3xl p-6 w-full mb-10">
            <p class="text-2xl font-bold mb-1" id="visitor-name-call">Unknown</p>
            <p class="text-orange-400 font-medium" id="visitor-reason-call">Zaroori Kaam</p>
        </div>
        <div class="flex gap-10">
            <button onclick="handleResponse('missed')" class="w-20 h-20 bg-red-600 rounded-full text-2xl flex items-center justify-center"><i class="fa-solid fa-phone-slash"></i></button>
            <button onclick="handleResponse('answered')" class="w-20 h-20 bg-green-500 rounded-full text-2xl flex items-center justify-center animate-bounce"><i class="fa-solid fa-phone"></i></button>
        </div>
    </div>

    <div id="app">
        <div id="screen-auth" class="screen p-6 text-center">
            <div class="mt-20">
                <div class="text-7xl mb-6">🚪</div>
                <h1 class="text-4xl font-bold mb-2">Darwaza Pro</h1>
                <p class="text-gray-500 mb-12">Security at your fingertips</p>
                <button onclick="login()" class="w-full bg-white text-black font-bold py-4 rounded-2xl flex items-center justify-center gap-3">
                    <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="20"> Continue with Google
                </button>
            </div>
        </div>

        <div id="screen-home" class="screen p-6">
            <div class="flex justify-between items-center mb-8 pt-6">
                <div>
                    <p class="text-orange-400 font-medium">Assalam-o-Alaikum</p>
                    <h1 class="text-3xl font-bold">Dashboard</h1>
                </div>
                <button onclick="unlockAudio()" id="audio-btn" class="bg-zinc-800 p-3 rounded-xl text-orange-400">
                    <i id="audio-icon" class="fa-solid fa-volume-xmark"></i>
                </button>
            </div>
            <div class="grid grid-cols-3 gap-3 mb-8">
                <div class="glass p-4 rounded-2xl text-center"><div class="text-2xl font-bold" id="stat-total">0</div><div class="text-[10px] text-gray-500 uppercase">Total</div></div>
                <div class="glass p-4 rounded-2xl text-center"><div class="text-2xl font-bold text-green-500" id="stat-answered">0</div><div class="text-[10px] text-gray-500 uppercase">Ans</div></div>
                <div class="glass p-4 rounded-2xl text-center"><div class="text-2xl font-bold text-red-500" id="stat-missed">0</div><div class="text-[10px] text-gray-500 uppercase">Missed</div></div>
            </div>
            <h3 class="font-bold mb-4">Active Door</h3>
            <div id="active-door-card" class="glass p-6 rounded-[2rem] text-center mb-6 border border-white/5">
                <p class="text-gray-500 italic">No door active</p>
            </div>
            <h3 class="font-bold mb-4">Recent History</h3>
            <div id="history-list" class="space-y-3"></div>
        </div>

        <div id="screen-doors" class="screen p-6">
            <h1 class="text-3xl font-bold mb-6 pt-6">Manage Doors</h1>
            <div id="door-list" class="space-y-3 mb-6"></div>
            <div class="glass p-6 rounded-3xl">
                <input type="text" id="door-name-input" placeholder="Door Name (e.g. Shop Gate)" class="mb-3">
                <button onclick="addDoor()" class="w-full bg-orange-500 text-black font-bold py-4 rounded-xl">Add New Door</button>
            </div>
        </div>

        <div id="screen-qr" class="screen p-6 text-center">
            <h1 class="text-3xl font-bold mb-8 pt-6">QR Terminal</h1>
            <div class="bg-white p-6 rounded-[2.5rem] inline-block mb-8">
                <div id="qrcode"></div>
            </div>
            <div class="flex flex-col gap-3">
                <button onclick="copyQRLink()" class="glass py-4 rounded-2xl font-bold">Copy Link</button>
                <button onclick="resetQRToken()" class="bg-red-500/10 text-red-500 py-4 rounded-2xl font-bold border border-red-500/20">Reset QR Token</button>
            </div>
        </div>

        <div id="screen-visitor" class="screen p-6 text-center">
            <div class="mt-8">
                <h2 class="text-2xl font-bold mb-6" id="v-door-title">Smart Doorbell</h2>
                <video id="v-camera" autoplay playsinline></video>
                <canvas id="v-canvas" class="hidden"></canvas>
                <img id="v-preview" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="visitor-img-frame mx-auto">
                <button id="btn-snap" onclick="startCamera()" class="bg-zinc-800 text-sm px-6 py-3 rounded-full mb-8 border border-white/10">Take Selfie First 📸</button>
                
                <input type="text" id="v-name-input" placeholder="Aapka Naam..." class="mb-4">
                <div class="flex flex-wrap justify-center gap-2 mb-8">
                    <div class="reason-chip" onclick="selectReason('Doodh Wala', this)">🥛 Doodh</div>
                    <div class="reason-chip" onclick="selectReason('Delivery', this)">📦 Delivery</div>
                    <div class="reason-chip" onclick="selectReason('Mehman', this)">🏠 Guest</div>
                </div>
                <button onclick="ringBell()" id="ring-btn" class="w-full bg-orange-500 text-black font-bold py-5 rounded-2xl text-xl shadow-lg opacity-50 pointer-events-none transition">RING BELL NOW</button>
            </div>
        </div>

        <div id="screen-profile" class="screen p-6">
            <h1 class="text-3xl font-bold mb-8 pt-6">Profile Settings</h1>
            <div class="glass p-6 rounded-3xl mb-6">
                <label class="text-xs text-gray-500 block mb-2 uppercase">WhatsApp Number</label>
                <input type="text" id="p-whatsapp" placeholder="+92 300 1234567" onchange="saveProfile()">
            </div>
            <button onclick="auth.signOut()" class="w-full text-red-500 font-bold glass py-4 rounded-2xl">Sign Out</button>
        </div>

        <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 glass border-t border-white/10 flex justify-around p-4 z-50 hidden">
            <button onclick="nav('home')" class="nav-item flex flex-col items-center gap-1"><i class="fa-solid fa-house"></i><span class="text-[10px]">Home</span></button>
            <button onclick="nav('doors')" class="nav-item flex flex-col items-center gap-1"><i class="fa-solid fa-door-open"></i><span class="text-[10px]">Doors</span></button>
            <button onclick="nav('qr')" class="nav-item flex flex-col items-center gap-1"><i class="fa-solid fa-qrcode"></i><span class="text-[10px]">QR</span></button>
            <button onclick="nav('profile')" class="nav-item flex flex-col items-center gap-1"><i class="fa-solid fa-user"></i><span class="text-[10px]">Profile</span></button>
        </nav>
    </div>

    <audio id="ring-audio" src="https://www.soundjay.com/phone/phone-calling-1.mp3" loop></audio>

    <script>
        // --- Firebase Config (Updated with your real credentials) ---
        const firebaseConfig = {
  apiKey: "AIzaSyCkxPJiYfXmutvzEKStyebV6R0yuoyJcBA",
  authDomain: "smart-door-bell-61052.firebaseapp.com",
  databaseURL: "https://smart-door-bell-61052-default-rtdb.firebaseio.com",
  projectId: "smart-door-bell-61052",
  storageBucket: "smart-door-bell-61052.firebasestorage.app",
  messagingSenderId: "443870830392",
  appId: "1:443870830392:web:beb328b07cc2ac88fbebcd",
  measurementId: "G-PE6CYZ2KGZ"
};
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.database();

        let user = null; let doors = []; let activeDoorId = null;
        let selectedReason = "General Visit"; let isAudioEnabled = false; let selfieData = null;

        // --- Core Flow Logic ---
        auth.onAuthStateChanged(u => {
            const params = new URLSearchParams(window.location.search);
            const dId = params.get('doorId');
            const tk = params.get('tk');

            if(dId && tk) {
                activeDoorId = dId;
                nav('visitor');
            } else if(u) {
                user = u;
                document.getElementById('bottom-nav').classList.remove('hidden');
                nav('home');
                loadUserData();
            } else {
                nav('auth');
            }
        });

        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        function loadUserData() {
            db.ref('user_doors/' + user.uid).on('value', s => {
                const data = s.val() || {};
                doors = Object.entries(data).map(([id, d]) => ({id, ...d}));
                renderDoorsList();
                if(doors.length > 0 && !activeDoorId) selectDoor(doors[0].id);
            });
            db.ref('stats/' + user.uid).on('value', s => {
                const st = s.val() || { total: 0, answered: 0, missed: 0 };
                document.getElementById('stat-total').innerText = st.total;
                document.getElementById('stat-answered').innerText = st.answered;
                document.getElementById('stat-missed').innerText = st.missed;
            });
            db.ref('profiles/' + user.uid).on('value', s => {
                if(s.val()) document.getElementById('p-whatsapp').value = s.val().whatsapp || "";
            });
        }

        // --- Door & QR Logic ---
        function addDoor() {
            const name = document.getElementById('door-name-input').value;
            if(!name) return;
            const doorId = "D-" + Math.random().toString(36).substr(2, 6).toUpperCase();
            const token = Math.random().toString(36).substr(2, 8);
            db.ref('user_doors/' + user.uid + '/' + doorId).set({ name: name, token: token, owner: user.uid });
            document.getElementById('door-name-input').value = "";
        }

        function selectDoor(id) {
            activeDoorId = id;
            const d = doors.find(x => x.id === id);
            document.getElementById('active-door-card').innerHTML = `<h2 class="text-2xl font-bold text-orange-400">${d.name}</h2><p class="text-gray-500 text-sm">Monitoring Active</p>`;
            listenForAlerts(id);
            renderDoorsList();
        }

        function resetQRToken() {
            const newToken = Math.random().toString(36).substr(2, 8);
            db.ref('user_doors/' + user.uid + '/' + activeDoorId).update({ token: newToken });
            alert("Security Updated!");
            nav('qr');
        }

        // --- Camera / Selfie Logic ---
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.getElementById('v-camera');
                video.srcObject = stream; video.style.display = 'block';
                document.getElementById('v-preview').style.display = 'none';
                document.getElementById('btn-snap').innerText = "Capture Photo 📸";
                document.getElementById('btn-snap').onclick = takePhoto;
            } catch (err) { alert("Camera access denied!"); }
        }

        function takePhoto() {
            const video = document.getElementById('v-camera');
            const canvas = document.getElementById('v-canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            selfieData = canvas.toDataURL('image/jpeg', 0.5);
            video.srcObject.getTracks().forEach(t => t.stop());
            video.style.display = 'none';
            document.getElementById('v-preview').src = selfieData;
            document.getElementById('v-preview').style.display = 'block';
            document.getElementById('ring-btn').classList.remove('opacity-50', 'pointer-events-none');
            document.getElementById('btn-snap').innerText = "Retake Photo";
            document.getElementById('btn-snap').onclick = startCamera;
        }

        // --- Bell & Alert Logic ---
        function ringBell() {
            const name = document.getElementById('v-name-input').value || "Guest";
            db.ref('alerts/' + activeDoorId).set({
                name: name, reason: selectedReason, selfie: selfieData,
                time: Date.now(), token: new URLSearchParams(window.location.search).get('tk')
            });
            alert("✅ Bell baj gayi hai!");
        }

        function listenForAlerts(id) {
            db.ref('alerts/' + id).on('value', s => {
                const data = s.val();
                if(data && (Date.now() - data.time < 30000)) {
                    document.getElementById('visitor-name-call').innerText = data.name;
                    document.getElementById('visitor-reason-call').innerText = data.reason;
                    document.getElementById('visitor-selfie-display').src = data.selfie || '';
                    document.getElementById('incoming-door-name').innerText = doors.find(x => x.id === id)?.name || "Door";
                    document.getElementById('call-overlay').classList.remove('hidden');
                    if(isAudioEnabled) document.getElementById('ring-audio').play().catch(()=>{});
                }
            });
        }

        function handleResponse(status) {
            document.getElementById('call-overlay').classList.add('hidden');
            document.getElementById('ring-audio').pause();
            db.ref('alerts/' + activeDoorId).once('value', s => {
                const data = s.val();
                if(!data) return;
                db.ref('stats/' + user.uid + '/total').transaction(c => (c||0)+1);
                db.ref('stats/' + user.uid + '/' + status).transaction(c => (c||0)+1);
                db.ref('alerts/' + activeDoorId).remove();
            });
        }

        // --- UI Nav & Helpers ---
        function nav(s) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active-screen'));
            const target = document.getElementById('screen-' + s);
            if(target) target.classList.add('active-screen');
            
            // Highlight nav icon
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            const navBtn = Array.from(document.querySelectorAll('.nav-item')).find(el => el.getAttribute('onclick').includes(s));
            if(navBtn) navBtn.classList.add('active');

            if(s === 'qr' && activeDoorId) {
                const d = doors.find(x => x.id === activeDoorId);
                const url = window.location.origin + window.location.pathname + `?doorId=${activeDoorId}&tk=${d.token}`;
                document.getElementById('qrcode').innerHTML = "";
                new QRCode(document.getElementById("qrcode"), { text: url, width: 180, height: 180 });
            }
        }

        function renderDoorsList() {
            const list = document.getElementById('door-list');
            if(!list) return;
            list.innerHTML = doors.map(d => `
                <div onclick="selectDoor('${d.id}')" class="glass p-4 rounded-2xl flex justify-between items-center ${activeDoorId === d.id ? 'border-orange-500' : ''}">
                    <p class="font-bold">${d.name}</p>
                    ${activeDoorId === d.id ? '<i class="fa-solid fa-circle-check text-orange-400"></i>' : ''}
                </div>
            `).join('');
        }

        function selectReason(r, el) {
            selectedReason = r;
            document.querySelectorAll('.reason-chip').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
        }

        function unlockAudio() {
            const ring = document.getElementById('ring-audio');
            ring.play().then(() => {
                ring.pause(); isAudioEnabled = true;
                document.getElementById('audio-icon').className = 'fa-solid fa-volume-high';
                document.getElementById('audio-btn').classList.replace('text-orange-400', 'text-green-500');
            }).catch(e => console.log("Audio interaction needed"));
        }

        function saveProfile() { db.ref('profiles/' + user.uid).update({ whatsapp: document.getElementById('p-whatsapp').value }); }
        function copyQRLink() {
            const d = doors.find(x => x.id === activeDoorId);
            const url = window.location.origin + window.location.pathname + `?doorId=${activeDoorId}&tk=${d.token}`;
            navigator.clipboard.writeText(url); alert("Link Copied!");
        }
    </script>
</body>
</html>
