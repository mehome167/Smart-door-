<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Bell Pro - Malta Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <style>
        :root { 
            --malta-gradient: linear-gradient(135deg, #f27121, #e94057);
            --primary: #f27121; --secondary: #333; --bg: #f9f9f9; 
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        
        .card { 
            background: white; border-radius: 20px; padding: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            max-width: 450px; width: 100%; text-align: center; border: 1px solid #eee;
        }
        
        h1 { color: var(--primary); margin-bottom: 5px; font-size: 24px; }
        .subtitle { color: #666; font-size: 13px; margin-bottom: 20px; }

        input, select, textarea { 
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; 
            border: 1px solid #ddd; font-size: 15px; outline: none;
        }

        .btn { 
            width: 100%; padding: 14px; border-radius: 10px; border: none; 
            font-size: 16px; font-weight: 600; cursor: pointer; color: white;
            margin: 5px 0; transition: 0.2s;
        }
        .btn-main { background: var(--malta-gradient); }
        .btn-whatsapp { background: #25d366; }
        .btn-download { background: #3498db; }
        .btn-stop { background: #333; margin-top: 10px; }

        #qrcode { margin: 15px auto; padding: 10px; border: 2px solid var(--primary); display: inline-block; border-radius: 10px; background: white; }
        #video { width: 100%; border-radius: 15px; margin-top: 10px; border: 2px solid #ddd; }
        
        .history-item { 
            text-align: left; padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; 
        }
        .history-item strong { color: var(--primary); }
        
        .hidden { display: none; }
        .alert-box { background: #fff3cd; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 5px solid #ffc107; }
    </style>
</head>
<body>

<div class="card">
    <h1>🔔 Smart Bell Pro</h1>
    <p class="subtitle">Innovation for a Smarter Home</p>
    
    <div id="setup-section">
        <input type="text" id="owner-name" placeholder="Ghar ka Naam (Owner Name)">
        <textarea id="owner-address" placeholder="Address (Pata)"></textarea>
        <button class="btn btn-main" onclick="generateSystem()">System Generate Karein</button>
        
        <div id="qr-output" class="hidden">
            <div id="qrcode"></div>
            <button class="btn btn-download" onclick="downloadQR()">💾 Gallery mein Save karein</button>
            <button class="btn btn-whatsapp" onclick="shareOwnerLink()">📲 Ghar walon ko bhejain (Admin)</button>
            <p style="font-size: 12px; color: #e94057; font-weight: bold;">Upar wala QR print karke darwaze par lagayein!</p>
        </div>
    </div>

    <div id="visitor-section" class="hidden">
        <h2 id="house-name" style="color: var(--primary);"></h2>
        <input type="text" id="visitor-name" placeholder="Apna Naam Likhein">
        <select id="visit-reason">
            <option value="Relative">Rishtedaar</option>
            <option value="Delivery">Delivery / Food</option>
            <option value="Guest">Guest</option>
            <option value="Emergency">Emergency 🆘</option>
        </select>
        <video id="video" autoplay playsinline></video>
        <button class="btn btn-main" onclick="submitVisit()">🚀 Bell Bajayein!</button>
    </div>

    <div id="owner-section" class="hidden">
        <div class="alert-box">
            <strong>Monitoring Mode Active</strong><br>
            Aapko live notifications milengi.
        </div>
        
        <div id="latest-alert"></div>
        <audio id="bell-sound" loop src="https://www.soundjay.com/phone/phone-calling-1.mp3"></audio>
        <button id="stop-btn" class="btn btn-stop hidden" onclick="stopBell()">🛑 Bell Band Karein</button>

        <hr>
        <h4>Mulaqatiyon ka Record (History)</h4>
        <div id="visitor-log" style="max-height: 300px; overflow-y: auto;">
            Loading history...
        </div>
    </div>
</div>

<script>
    // --- Firebase Configuration ---
    const firebaseConfig = {
        apiKey: "AIzaSyCkxPJiYfXmutvzEKStyebV6R0yuoyJcBA",
        authDomain: "smart-door-bell-61052.firebaseapp.com",
        projectId: "smart-door-bell-61052",
        databaseURL: "https://smart-door-bell-61052-default-rtdb.firebaseio.com",
        storageBucket: "smart-door-bell-61052.firebasestorage.app",
        messagingSenderId: "443870830392",
        appId: "1:443870830392:web:beb328b07cc2ac88fbebcd"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // URL Parameters
    const urlParams = new URLSearchParams(window.location.search);
    const myId = urlParams.get('id');
    const role = urlParams.get('role');

    window.onload = () => {
        if (role === 'visitor') initVisitor();
        else if (role === 'owner') initOwner();
    };

    // --- SETUP LOGIC ---
    function generateSystem() {
        const name = document.getElementById('owner-name').value;
        const addr = document.getElementById('owner-address').value;
        if (!name || !addr) return alert("Pehle details bharein!");

        const houseId = "HBell_" + Math.random().toString(36).substr(2, 7);
        const baseUrl = window.location.href.split('?')[0];
        
        // Host hone ke baad ye link asli web link ban jayega
        const vUrl = `${baseUrl}?id=${houseId}&role=visitor`;
        const oUrl = `${baseUrl}?id=${houseId}&role=owner`;

        db.ref('houses/' + houseId + '/info').set({ name, addr });

        // QR Code
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: vUrl, width: 180, height: 180 });
        
        window.ownerLink = oUrl; // Global save for sharing
        document.getElementById('qr-output').classList.remove('hidden');
    }

    function downloadQR() {
        const canvas = document.querySelector('#qrcode canvas');
        const link = document.createElement('a');
        link.href = canvas.toDataURL("image/png");
        link.download = 'SmartBell_QR.png';
        link.click();
    }

    function shareOwnerLink() {
        const msg = encodeURIComponent("Assalam-o-Alaikum! Ye mere ghar ka Smart Bell Admin link hai: " + window.ownerLink);
        window.open(`https://wa.me/?text=${msg}`, '_blank');
    }

    // --- VISITOR LOGIC ---
    function initVisitor() {
        document.getElementById('setup-section').classList.add('hidden');
        document.getElementById('visitor-section').classList.remove('hidden');
        db.ref('houses/' + myId + '/info').once('value', s => {
            document.getElementById('house-name').innerText = s.val().name + " ka Ghar";
        });
        navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
            document.getElementById('video').srcObject = stream;
        });
    }

    function submitVisit() {
        const name = document.getElementById('visitor-name').value || "Anjaan Shakhs";
        const reason = document.getElementById('visit-reason').value;
        const timestamp = Date.now();

        // 1. Alert for Live Notification
        db.ref('houses/' + myId + '/live_alert').set({ name, reason, timestamp });

        // 2. History for Log (Multiple entries)
        db.ref('houses/' + myId + '/history').push({
            name, reason, 
            time: new Date().toLocaleTimeString(),
            date: new Date().toLocaleDateString()
        });

        alert("Bell baj gayi hai! Intezaar farmayein.");
    }

    // --- OWNER/ADMIN LOGIC ---
    function initOwner() {
        document.getElementById('setup-section').classList.add('hidden');
        document.getElementById('owner-section').classList.remove('hidden');

        // Listen for live alerts
        db.ref('houses/' + myId + '/live_alert').on('value', s => {
            const data = s.val();
            if (data && (Date.now() - data.timestamp < 15000)) { // Only alert if less than 15 sec old
                playAlarm(data);
            }
        });

        // Load History
        db.ref('houses/' + myId + '/history').limitToLast(20).on('value', s => {
            const log = document.getElementById('visitor-log');
            log.innerHTML = "";
            let historyData = [];
            s.forEach(child => { historyData.unshift(child.val()); }); // Newest first

            historyData.forEach(item => {
                log.innerHTML += `
                    <div class="history-item">
                        <strong>${item.name}</strong> (${item.reason})<br>
                        <small>${item.date} | ${item.time}</small>
                    </div>`;
            });
        });
    }

    function playAlarm(data) {
        document.getElementById('bell-sound').play();
        document.getElementById('stop-btn').classList.remove('hidden');
        document.getElementById('latest-alert').innerHTML = `
            <div class="alert-box" style="background:#d4edda; border-color:#28a745;">
                <strong>Naya Visitor!</strong><br>
                ${data.name} darwaze par hai (${data.reason})
            </div>`;
    }

    function stopBell() {
        document.getElementById('bell-sound').pause();
        document.getElementById('bell-sound').currentTime = 0;
        document.getElementById('stop-btn').classList.add('hidden');
    }
</script>

</body>
</html>
