<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Darwaza - Smart Doorbell</title>
    
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

    <style>
        :root {
            --primary: #FF9F0A; /* Competitor's Gold/Orange */
            --bg-dark: #000000;
            --card-dark: #1C1C1E;
            --text-main: #FFFFFF;
            --text-dim: #8E8E93;
            --accent-green: #30D158;
            --accent-red: #FF453A;
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-dark); margin: 0; padding: 0; color: var(--text-main); }

        /* General Layout */
        .container { max-width: 480px; margin: 0 auto; min-height: 100vh; padding: 20px; }
        .screen { display: none; animation: slideUp 0.4s ease-out; }
        .active { display: flex; flex-direction: column; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* UI Elements */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo-text { font-size: 24px; font-weight: 700; color: var(--primary); }
        
        .card { background: var(--card-dark); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #2C2C2E; }
        
        .btn {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s;
            margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-primary { background: var(--primary); color: black; }
        .btn-google { background: white; color: black; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }

        /* Stats Grid */
        .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 15px 0; }
        .stat-item { text-align: center; background: #2C2C2E; padding: 10px; border-radius: 12px; }
        .stat-val { display: block; font-size: 20px; font-weight: bold; color: var(--primary); }
        .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }

        /* QR Area */
        #qrcode { background: white; padding: 10px; border-radius: 12px; display: inline-block; margin: 15px 0; }
        
        /* Visitor List */
        .visitor-item { display: flex; align-items: center; gap: 15px; padding: 12px 0; border-bottom: 1px solid #2C2C2E; }
        .v-avatar { width: 45px; height: 45px; background: #3A3A3C; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .v-info { flex: 1; }
        .v-name { font-weight: 600; font-size: 15px; }
        .v-time { font-size: 12px; color: var(--text-dim); }

        /* Input Styles */
        input { 
            width: 100%; background: #2C2C2E; border: 1px solid #3A3A3C; 
            padding: 14px; border-radius: 12px; color: white; margin-bottom: 10px; outline: none;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="screen-auth" class="screen active">
            <div style="text-align: center; margin-top: 50px;">
                <div style="font-size: 60px; margin-bottom: 20px;">🚪</div>
                <h1 style="font-size: 32px;">Darwaza Pro</h1>
                <p style="color: var(--text-dim);">Smart Home, Secure Future</p>
                <div style="margin-top: 40px;">
                    <button class="btn btn-google" onclick="login()">
                        <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="20"> Continue with Google
                    </button>
                </div>
            </div>
        </div>

        <div id="screen-dash" class="screen">
            <div class="header">
                <div>
                    <span class="logo-text">Darwaza</span>
                    <div id="user-name" style="font-size: 12px; color: var(--text-dim);">Welcome!</div>
                </div>
                <div style="background: var(--card-dark); padding: 8px; border-radius: 10px;">🔔</div>
            </div>

            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3 id="current-door-name">No Door Added</h3>
                    <button class="btn-outline" style="width: auto; padding: 5px 12px; font-size: 12px;" onclick="showScreen('screen-add-door')">+ Add</button>
                </div>
                
                <div class="stats-row">
                    <div class="stat-item"><span class="stat-val" id="count-total">0</span><span class="stat-label">Total</span></div>
                    <div class="stat-item"><span class="stat-val" style="color: var(--accent-green);" id="count-answered">0</span><span class="stat-label">Answered</span></div>
                    <div class="stat-item"><span class="stat-val" style="color: var(--accent-red);" id="count-missed">0</span><span class="stat-label">Missed</span></div>
                </div>

                <div id="owner-qr-area" class="hidden" style="text-align: center;">
                    <div id="qrcode"></div>
                    <p style="font-size: 11px; color: var(--text-dim);">Scan this QR to ring your door</p>
                </div>

                <button id="activate-bell" class="btn btn-primary" onclick="unlockAudio()">
                    🎧 Enable Doorbell Audio
                </button>
            </div>

            <h4>Recent Activity</h4>
            <div id="activity-list" class="card" style="padding: 10px;">
                <div style="text-align: center; color: var(--text-dim); padding: 20px;">No activity yet.</div>
            </div>
        </div>

        <div id="screen-add-door" class="screen">
            <h3>Add New Door</h3>
            <p style="color: var(--text-dim);">Apne darwaze ka naam rakhein (e.g., Home, Office)</p>
            <input type="text" id="new-door-name" placeholder="Ghar ka Naam">
            <button class="btn btn-primary" onclick="createNewDoor()">Create Door & Generate QR</button>
            <button class="btn" style="color: white;" onclick="showScreen('screen-dash')">Cancel</button>
        </div>

        <div id="screen-visitor" class="screen">
            <div class="card" style="text-align: center;">
                <h1 id="v-house-name">Smart Door</h1>
                <div style="font-size: 50px; margin: 20px 0;">👋</div>
                <p>Darwaze par kaun hai? Apna naam batayein.</p>
                <input type="text" id="v-name-input" placeholder="Aapka Naam">
                <button class="btn btn-primary" style="height: 70px; font-size: 18px;" onclick="ringTheBell()">🚀 Ring Bell Now</button>
            </div>
        </div>

    </div>

    <audio id="bell-audio" src="https://www.soundjay.com/phone/phone-calling-1.mp3" preload="auto"></audio>

    <script>
        // --- Firebase Configuration ---
        const firebaseConfig = {
  apiKey: "AIzaSyCkxPJiYfXmutvzEKStyebV6R0yuoyJcBA",
  authDomain: "smart-door-bell-61052.firebaseapp.com",
  databaseURL: "https://smart-door-bell-61052-default-rtdb.firebaseio.com",
  projectId: "smart-door-bell-61052",
  storageBucket: "smart-door-bell-61052.firebasestorage.app",
  messagingSenderId: "443870830392",
  appId: "1:443870830392:web:beb328b07cc2ac88fbebcd",
  measurementId: "G-PE6CYZ2KGZ"
};
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let currentUser = null;
        let currentDoorId = null;

        // --- Screen Management ---
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // --- Auth Logic ---
        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(res => {
                currentUser = res.user;
                initDashboard();
            }).catch(err => alert("Login failed: " + err.message));
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('doorId')) {
                    initVisitor(urlParams.get('doorId'));
                } else {
                    initDashboard();
                }
            }
        });

        // --- Dashboard Logic ---
        function initDashboard() {
            document.getElementById('user-name').innerText = currentUser.displayName;
            showScreen('screen-dash');
            
            // Check if user has a door
            db.ref('user_doors/' + currentUser.uid).once('value', s => {
                if(s.exists()) {
                    currentDoorId = s.val().activeDoor;
                    loadDoorDetails(currentDoorId);
                }
            });
        }

        function createNewDoor() {
            const name = document.getElementById('new-door-name').value;
            if(!name) return alert("Naam likhna lazmi hai!");

            const doorId = "D-" + Math.random().toString(36).substr(2, 6).toUpperCase();
            const doorData = {
                name: name,
                owner: currentUser.uid,
                createdAt: Date.now()
            };

            db.ref('doors/' + doorId).set(doorData);
            db.ref('user_doors/' + currentUser.uid).set({ activeDoor: doorId });
            
            currentDoorId = doorId;
            loadDoorDetails(doorId);
            showScreen('screen-dash');
        }

        function loadDoorDetails(id) {
            db.ref('doors/' + id).once('value', s => {
                const data = s.val();
                document.getElementById('current-door-name').innerText = data.name;
                
                // QR Generation
                const visitorUrl = window.location.href.split('?')[0] + "?doorId=" + id;
                document.getElementById('owner-qr-area').classList.remove('hidden');
                document.getElementById('qrcode').innerHTML = "";
                new QRCode(document.getElementById("qrcode"), {
                    text: visitorUrl,
                    width: 160,
                    height: 160,
                    colorDark : "#000000",
                    colorLight : "#ffffff"
                });

                startAlertListener(id);
            });
        }

        // --- Monitoring & Audio ---
        let isAudioUnlocked = false;
        function unlockAudio() {
            const audio = document.getElementById('bell-audio');
            audio.play().then(() => {
                audio.pause();
                isAudioUnlocked = true;
                document.getElementById('activate-bell').innerText = "✅ Audio Active";
                document.getElementById('activate-bell').style.background = "#30D158";
            });
        }

        function startAlertListener(id) {
            db.ref('alerts/' + id).on('value', s => {
                const alert = s.val();
                if(alert && (Date.now() - alert.time < 10000)) {
                    if(isAudioUnlocked) document.getElementById('bell-audio').play();
                    alert("🔔 " + alert.visitorName + " darwaze par hai!");
                    updateActivityList(alert.visitorName);
                }
            });
        }

        function updateActivityList(name) {
            const list = document.getElementById('activity-list');
            const item = `<div class="visitor-item">
                <div class="v-avatar">👤</div>
                <div class="v-info">
                    <div class="v-name">${name}</div>
                    <div class="v-time">Just now</div>
                </div>
            </div>`;
            list.innerHTML = item + list.innerHTML;
        }

        // --- Visitor Logic ---
        function initVisitor(doorId) {
            currentDoorId = doorId;
            showScreen('screen-visitor');
            db.ref('doors/' + doorId + '/name').once('value', s => {
                document.getElementById('v-house-name').innerText = s.val() || "Smart Door";
            });
        }

        function ringTheBell() {
            const name = document.getElementById('v-name-input').value || "Unknown Visitor";
            db.ref('alerts/' + currentDoorId).set({
                visitorName: name,
                time: Date.now()
            });
            alert("✅ Bell baj gayi hai! Intezar karein.");
        }

    </script>
</body>
</html>
